package:
  name: mojo-raylib-shim
  version: 0.1.0

# Stage only what the shim needs. Staging the whole repo makes pixi re-copy
# 1500+ files on every run; this version stays under ~1300 (raylib alone).
source:
  - path: .
  - path: ../native
    target_directory: native
  - path: ../vendor/raylib
    target_directory: vendor/raylib
    use_gitignore: false

build:
  number: 0
  script:
    interpreter: bash
    file: build.sh

requirements:
  build:
    - ${{ compiler('c') }}
    - cmake
    - ninja

    - if: linux
      then:
        - patchelf
        - xorg-libx11
        - xorg-libxrandr
        - xorg-libxi
        - xorg-libxcursor
        - xorg-libxinerama
        - libgl-devel
        - libglu
        - alsa-lib

  host:
    - if: linux
      then:
        - xorg-libx11
        - xorg-libxrandr
        - xorg-libxi
        - xorg-libxcursor
        - xorg-libxinerama
        - libgl-devel
        - libglu
        - alsa-lib

  run_exports:
    - ${{ pin_subpackage('mojo-raylib-shim', upper_bound='x.x') }}
