[workspace]
channels = ["https://prefix.dev/conda-forge"]
platforms = ["osx-arm64", "linux-64"]
preview = ["pixi-build"]

[package]
name = "mojo-raylib-shim"
version = "0.1.0"

[package.build.backend]
name = "pixi-build-rattler-build"
version = "0.*"
channels = [
    "https://prefix.dev/pixi-build-backends",
    "https://prefix.dev/conda-forge",
]

[package.build.config]
# Limit rebuild detection to files this package actually depends on, so unrelated
# repo edits don't re-trigger a full raylib + shim rebuild.
# Only files listed here trigger a shim rebuild. Anything else in the repo
# (mojo source, examples, READMEs) is irrelevant to the shim's output.
extra-input-globs = [
    "build.sh",
    "recipe.yaml",
    "../native/mojo_raylib_shim.c",
    "../vendor/raylib/src/**",
    "../vendor/raylib/CMakeLists.txt",
    "../vendor/raylib/cmake/**",
]
